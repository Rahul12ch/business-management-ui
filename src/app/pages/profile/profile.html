<div class="profile-container">
  <div class="profile-card">

    <div class="profile-body">
      <div class="left-panel">
        <img *ngIf="profileImage" [src]="profileImage" class="profile-image" alt="Profile Image">
        <div *ngIf="!profileImage" class="avatar"> {{ username ? username.charAt(0).toUpperCase() : 'U' }} </div>

        <input #fileInput hidden type="file" accept="image/*" (change)="onFileSelected($event)">
        <button *ngIf="isEditMode" pButton type="button" icon="pi pi-upload" label="Change Photo"
          class="change-photo-btn" (click)="fileInput.click()">  </button>
      </div>

      <div class="right-panel">
        <div class="field-group">
          <label>Username</label>
          <input pInputText [(ngModel)]="username" [readonly]="!isEditMode" placeholder="Enter username" autocomplete="username"> </div>
        <div class="field-group">
          <label>Email</label>
          <input pInputText type="email" [(ngModel)]="email" [readonly]="!isEditMode" placeholder="Enter email" autocomplete="email"> </div>
        <div class="field-group">
          <label>Member Since</label>  <input pInputText [value]="createdDate" readonly> </div>
        <div class="field-group">
          <label>Current Password</label>
          <div class="password-wrapper">
            <input pInputText [type]="showCurrentPwd ? 'text' : 'password'" [(ngModel)]="currentPassword"
              [readonly]="!isEditMode" placeholder="Current password" autocomplete="current-password">
            <button *ngIf="isEditMode" type="button" class="eye-btn" (click)="showCurrentPwd=!showCurrentPwd">
              <i [class]="showCurrentPwd ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>  </button>
          </div>
        </div>

        <div class="field-group">
          <label>New Password</label>
          <div class="password-wrapper">
            <input pInputText [type]="showNewPwd ? 'text' : 'password'" [(ngModel)]="newPassword"
              [readonly]="!isEditMode" placeholder="Leave blank to keep current password" autocomplete="new-password">
            <button *ngIf="isEditMode" type="button" class="eye-btn" (click)="showNewPwd=!showNewPwd">
              <i [class]="showNewPwd ? 'pi pi-eye-slash' : 'pi pi-eye'"></i> </button>
          </div>
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <ng-container *ngIf="!isEditMode">
        <button pButton type="button" icon="pi pi-pencil" label="Edit Profile" (click)="enableEdit()"></button>
      </ng-container>
      <ng-container *ngIf="isEditMode">
        <button pButton type="button" severity="secondary" label="Cancel" (click)="cancelChanges()" [disabled]="saving"> </button>
        <button pButton type="button" icon="pi pi-check" label="Save" [loading]="saving" [disabled]="saving" (click)="saveProfile()"> </button>
      </ng-container>
    </div>
  </div>
</div>
